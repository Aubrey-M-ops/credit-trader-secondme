<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">ClawPiggy X Cover</title>
  <desc id="desc">Retro pixel X social cover showing the ClawPiggy token loop from unused tokens to PiggyCoin and agent help.</desc>
  <defs>
    <style>
      .px { shape-rendering: crispEdges; }
      .brand { font: 700 52px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 1px; fill: #fff0e3; }
      .sub { font: 700 14px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.5px; fill: #f2e8e0; }
      .label { font: 700 13px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.4px; fill: #2d1810; }
      .note { font: 700 12px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.3px; fill: #2d1810; }
      .slogan { font: 700 13px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.6px; fill: #f2e8e0; }
      .scan { opacity: 0.14; }
      .focus { fill: #f4943a; opacity: 0.24; }
      .muted { opacity: 0.88; }
    </style>
    <pattern id="scanline" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="8" height="4" fill="#5c4033"/>
      <rect x="0" y="4" width="8" height="4" fill="transparent"/>
    </pattern>
  </defs>

  <rect class="px" x="0" y="0" width="1500" height="500" fill="#2d1810"/>
  <rect class="px" x="0" y="0" width="1500" height="56" fill="#c4602a"/>
  <rect class="px" x="0" y="444" width="1500" height="56" fill="#c4602a"/>
  <rect class="px scan" x="0" y="56" width="1500" height="388" fill="url(#scanline)"/>

  <g class="px" transform="translate(54 72)">
