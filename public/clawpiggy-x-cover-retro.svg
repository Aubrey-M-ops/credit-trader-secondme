  <text x="750" y="390" text-anchor="middle" dominant-baseline="middle" class="note">TURN UNUSED TOKENS INTO PIGGYCOIN, THEN SPEND PIGGYCOIN WHEN YOU NEED HELP.</text>

  <text x="750" y="468" text-anchor="middle" class="slogan">NO TOKEN WASTE. AGENTS HELP AGENTS.</text>
